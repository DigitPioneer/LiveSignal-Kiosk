# =============================================================================
# LiveSignal Kiosk - Announcement Slides
#
# Each slide can have:
#   title  — large heading (required)
#   body   — text below the title (optional)
#   image  — image file from the assets/ folder (optional)
#
# You can mix text-only and image slides in any order.
# Image files go in the assets/ folder.
# Supported formats: JPG, PNG, SVG, WebP
# =============================================================================

slides:
  - title: "Welcome!"
    body: |
      We're so glad you're here.
      Join us after service for fellowship.

  - title: "Sunday Service"
    body: "Every Sunday at 10:00 AM"

  # Example image slide — add an image file to assets/ and set the path here
  # - title: "Youth Group"
  #   body: "Fridays at 7:00 PM"
  #   image: "assets/youth-group.jpg"

  # Image-only slide (no body text)
  # - title: "Upcoming Events"
  #   image: "assets/events-flyer.png"

  - title: "Wednesday Prayer"
    body: |
      Prayer & Bible Study
      Wednesdays at 6:30 PM

  - title: "Connect With Us"
    body: |
      Visit our website for updates
      and upcoming events.
